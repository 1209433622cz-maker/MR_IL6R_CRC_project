<text x="1200" y="1325" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111">MR and colocalization did not support a strong causal or shared-variant effect; TCGA, single-cell and support-layer</text>
<text x="1200" y="1325" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111">analyses convergently linked IL6R to an immune-, myeloid-, and inflammatory-associated colorectal cancer tumour</text>
<text x="1200" y="1325" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111">microenvironment.</text>
